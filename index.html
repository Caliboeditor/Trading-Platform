<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Hub STEP 5</title>

<style>
body{margin:0;font-family:Arial;background:#eef0f4;}
.main{max-width:900px;margin:auto;padding:10px;}
.card{background:white;padding:12px;border-radius:12px;margin-bottom:10px;}
input,textarea{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #ddd;}
button{width:100%;padding:10px;margin-top:8px;border:none;background:#111;color:white;border-radius:8px;}
.post{background:white;padding:12px;border-radius:10px;margin:10px 0;}
.chatBox{height:60vh;overflow:auto;background:#f7f7f7;padding:10px;border-radius:10px;}
.msg{margin:5px;padding:8px;border-radius:10px;display:inline-block;max-width:70%;}
.me{background:black;color:white;float:right;clear:both;}
.other{background:#ddd;float:left;clear:both;}

.messenger{
position:fixed;bottom:20px;right:20px;width:60px;height:60px;background:#0084ff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:25px;cursor:pointer;
}
.badge{position:absolute;top:5px;right:5px;background:red;width:18px;height:18px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;color:white;}

img{max-width:100%;border-radius:10px;margin-top:5px;}
</style>
</head>

<body>

<div id="root"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, addDoc, onSnapshot, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAi6LMeK1MwXBBaI4xSvTAjrYn6P0YSTHM",
  authDomain: "trading-web-6d548.firebaseapp.com",
  projectId: "trading-web-6d548",
  storageBucket: "trading-web-6d548.appspot.com",
  messagingSenderId: "465015762771",
  appId: "1:465015762771:web:394098ccad3f3ef2c53ba6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

const root = document.getElementById("root");

/* LOGIN */
function loginPage(){
root.innerHTML=`
<div class="main">
<div class="card">
<h2>Trading Hub STEP 5</h2>
<button onclick="login()">Login Google</button>
</div>
</div>`;
}

window.login=()=>signInWithPopup(auth,provider);

/* USER */
async function checkUser(user){
const ref=doc(db,"users",user.uid);
const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
name:user.displayName,
online:true
});
}

home(user);
}

/* ONLINE */
async function setOnline(status){
const user=auth.currentUser;
if(!user) return;
await updateDoc(doc(db,"users",user.uid),{online:status});
}

/* IMAGE UPLOAD */
async function uploadImage(file,path){
const storageRef=ref(storage,path);
await uploadBytes(storageRef,file);
return await getDownloadURL(storageRef);
}

/* POST */
window.addPost=async function(){

const title=document.getElementById("title").value;
const price=document.getElementById("price").value;
const desc=document.getElementById("desc").value;
const file=document.getElementById("img").files[0];

let imgURL="";

if(file){
imgURL=await uploadImage(file,"posts/"+Date.now());
}

await addDoc(collection(db,"posts"),{
title,price,desc,img:imgURL,
uid:auth.currentUser.uid,
createdAt:Date.now()
});
};

/* LOAD POSTS + SEARCH */
function loadPosts(){

const q=query(collection(db,"posts"),orderBy("createdAt","desc"));

onSnapshot(q,(snap)=>{

let html="";

snap.forEach(d=>{
const p=d.data();

html+=`
<div class="post">
<h3>${p.title}</h3>
<p>₱${p.price}</p>
<p>${p.desc}</p>
${p.img?`<img src="${p.img}">`:""}
<button onclick="openChat('${p.uid}')">Message</button>
</div>`;
});

document.getElementById("posts").innerHTML=html;
});
}

/* CHAT */
window.openChat=function(uid){

const chatId=auth.currentUser.uid<uid?
auth.currentUser.uid+"_"+uid:
uid+"_"+auth.currentUser.uid;

root.innerHTML=`
<div class="main">
<h3>Chat</h3>
<div id="chatBox" class="chatBox"></div>
<input id="msg">
<input type="file" id="chatImg">
<button onclick="send('${chatId}')">Send</button>
<button onclick="home()">Back</button>
</div>`;

loadChat(chatId);
};

/* SEND MESSAGE + IMAGE */
window.send=async function(chatId){

const msg=document.getElementById("msg").value;
const file=document.getElementById("chatImg").files[0];

let img="";

if(file){
img=await uploadImage(file,"chat/"+Date.now());
}

await addDoc(collection(db,"chats",chatId,"messages"),{
text:msg,
img,
sender:auth.currentUser.uid,
createdAt:Date.now()
});
};

/* LOAD CHAT */
function loadChat(chatId){

const q=query(collection(db,"chats",chatId,"messages"),orderBy("createdAt"));

onSnapshot(q,(snap)=>{

let html="";

snap.forEach(d=>{
const m=d.data();
const me=m.sender===auth.currentUser.uid;

html+=`
<div class="msg ${me?'me':'other'}">
${m.text||""}
${m.img?`<img src="${m.img}">`:""}
</div>`;
});

document.getElementById("chatBox").innerHTML=html;
});
}

/* HOME */
function home(){

root.innerHTML=`
<div class="main">

<div class="card">
<h3>Post Item</h3>
<input id="title" placeholder="title">
<input id="price" placeholder="price">
<textarea id="desc"></textarea>
<input type="file" id="img">
<button onclick="addPost()">Post</button>
</div>

<div id="posts"></div>

</div>

<div class="messenger" onclick="inbox()">
💬
<div class="badge">1</div>
</div>
`;

loadPosts();
}

/* INBOX (REAL START VERSION) */
window.inbox=function(){
alert("Inbox system next upgrade (STEP 6 advanced unread system)");
};

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(user){
setOnline(true);
checkUser(user);
}else loginPage();
});

loginPage();

</script>

</body>
</html>
