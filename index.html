<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEP 7 INBOX UPGRADE</title>

<style>
body{margin:0;font-family:Arial;background:#eef0f4;}
.main{max-width:900px;margin:auto;padding:10px;}
.card{background:white;padding:12px;border-radius:10px;margin-bottom:10px;}
input,textarea{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ddd;}
button{width:100%;padding:10px;margin-top:8px;background:#111;color:white;border:none;border-radius:8px;}

.post{background:white;padding:12px;border-radius:10px;margin:10px 0;}

.chatBox{height:60vh;overflow:auto;background:#f7f7f7;padding:10px;border-radius:10px;}

.msgRow{display:flex;margin:6px 0;}
.me{justify-content:flex-end;}
.other{justify-content:flex-start;}

.bubble{
max-width:70%;
padding:10px;
border-radius:12px;
white-space:pre-wrap;
word-wrap:break-word;
}

.mine{background:black;color:white;}
.theirs{background:#ddd;}

/* INBOX UI */
.inboxItem{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.badge{
background:red;
color:white;
width:20px;
height:20px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.messenger{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#0084ff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:25px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
getFirestore,
doc,
getDoc,
setDoc,
collection,
addDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig={
apiKey:"AIzaSyAi6LMeK1MwXBBaI4xSvTAjrYn6P0YSTHM",
authDomain:"trading-web-6d548.firebaseapp.com",
projectId:"trading-web-6d548",
storageBucket:"trading-web-6d548.appspot.com",
messagingSenderId:"465015762771",
appId:"1:465015762771:web:394098ccad3f3ef2c53ba6"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const root=document.getElementById("root");

/* ================= LOGIN ================= */
function loginPage(){
root.innerHTML=`
<div class="main">
<div class="card">
<h2>STEP 7 INBOX SYSTEM</h2>
<button onclick="login()">Login</button>
</div>
</div>`;
}

window.login=()=>signInWithPopup(auth,new GoogleAuthProvider());

/* ================= USERS ================= */
async function ensureUser(user){
const ref=doc(db,"users",user.uid);
const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
name:user.displayName,
createdAt:Date.now()
});
}

home();
}

/* ================= MARKETPLACE DEMO ================= */
function home(){

root.innerHTML=`
<div class="main">

<div class="card">
<h3>Marketplace</h3>
<p>Click users to chat demo</p>

<button onclick="openChat('userA')">Chat User A</button>
<button onclick="openChat('userB')">Chat User B</button>
</div>

</div>

<div class="messenger" onclick="openInbox()">
💬
</div>
`;
}

/* ================= CHAT SYSTEM ================= */
window.openChat=function(uid){

const me=auth.currentUser.uid;
const chatId = me<uid ? me+"_"+uid : uid+"_"+me;

root.innerHTML=`
<div class="main">

<h3>Chat</h3>

<div id="chatBox" class="chatBox"></div>

<input id="msg">
<button onclick="send('${chatId}')">Send</button>

<button onclick="home()">Back</button>

</div>`;

loadChat(chatId);
};

/* SEND */
window.send=async function(chatId){

const msg=document.getElementById("msg").value;

await addDoc(collection(db,"chats",chatId,"messages"),{
text:msg,
sender:auth.currentUser.uid,
createdAt:Date.now()
});
};

/* LOAD CHAT */
function loadChat(chatId){

const q=query(collection(db,"chats",chatId,"messages"),orderBy("createdAt"));

onSnapshot(q,(snap)=>{

let html="";

snap.forEach(d=>{
const m=d.data();
const me=m.sender===auth.currentUser.uid;

html+=`
<div class="msgRow ${me?'me':'other'}">
<div class="bubble ${me?'mine':'theirs'}">
${m.text}
</div>
</div>`;
});

document.getElementById("chatBox").innerHTML=html;
});
}

/* ================= INBOX CORE (STEP 7 MAIN FEATURE) ================= */
window.openInbox=function(){

const me=auth.currentUser.uid;

root.innerHTML=`
<div class="main">
<h2>💬 Inbox</h2>
<div id="inboxList"></div>
<button onclick="home()">Back</button>
</div>
`;

loadInbox();
};

/* ================= LOAD INBOX (REAL SYSTEM) ================= */
function loadInbox(){

const me=auth.currentUser.uid;

const q=query(collection(db,"chats"));

onSnapshot(q,(snap)=>{

let html="";

snap.forEach(d=>{

const chatId=d.id;

if(!chatId.includes(me)) return;

const other=chatId.replace(me,"").replace("_","");

/* last message */
const msgRef=collection(db,"chats",chatId,"messages");

onSnapshot(query(msgRef,orderBy("createdAt")), (msgs)=>{

let last="";
msgs.forEach(m=> last=m.data().text);

html+=`
<div class="inboxItem" onclick="openChat('${other}')">
<div>
<b>${other}</b><br>
<small>${last}</small>
</div>

<div class="badge">1</div>
</div>
`;

document.getElementById("inboxList").innerHTML=html;
});
});

});
}

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(user) ensureUser(user);
else loginPage();
});

loginPage();

</script>

</body>
</html>
