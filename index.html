<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEP 6 Messenger FIX</title>

<style>
body{margin:0;font-family:Arial;background:#eef0f4;}
.main{max-width:900px;margin:auto;padding:10px;}
.card{background:white;padding:12px;border-radius:10px;margin-bottom:10px;}
input,textarea{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ddd;}
button{width:100%;padding:10px;margin-top:8px;background:#111;color:white;border:none;border-radius:8px;}

/* POSTS */
.post{background:white;padding:12px;border-radius:10px;margin:10px 0;}
img{max-width:100%;border-radius:10px;margin-top:5px;}

/* CHAT */
.chatBox{height:65vh;overflow:auto;background:#f7f7f7;padding:10px;border-radius:10px;}

.msgRow{display:flex;margin:6px 0;}
.me{justify-content:flex-end;}
.other{justify-content:flex-start;}

.bubble{
max-width:70%;
padding:10px;
border-radius:12px;
white-space:pre-wrap;
word-wrap:break-word;
}

.mine{background:black;color:white;}
.theirs{background:#ddd;}

/* FLOAT */
.messenger{
position:fixed;bottom:20px;right:20px;
width:60px;height:60px;
background:#0084ff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:25px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyAi6LMeK1MwXBBaI4xSvTAjrYn6P0YSTHM",
authDomain:"trading-web-6d548.firebaseapp.com",
projectId:"trading-web-6d548",
storageBucket:"trading-web-6d548.appspot.com",
messagingSenderId:"465015762771",
appId:"1:465015762771:web:394098ccad3f3ef2c53ba6"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

const root=document.getElementById("root");

/* ================= IMAGE FIX (IMPORTANT) ================= */
async function uploadImage(file,type){

// 🔥 SEPARATED STORAGE PATH
const path = type==="post"
? "posts/"+Date.now()
: "chats/"+Date.now();

const storageRef=ref(storage,path);
await uploadBytes(storageRef,file);

return await getDownloadURL(storageRef);
}

/* ================= HOME ================= */
function home(){

root.innerHTML=`
<div class="main">

<div class="card">
<h3>Create Post</h3>
<input id="title">
<input id="price">
<textarea id="desc"></textarea>
<input type="file" id="postImg">
<button onclick="addPost()">Post</button>
</div>

<div id="posts"></div>

</div>

<div class="messenger" onclick="openInbox()">💬</div>
`;

loadPosts();
}

/* ================= ADD POST ================= */
window.addPost=async function(){

const title=document.getElementById("title").value;
const price=document.getElementById("price").value;
const desc=document.getElementById("desc").value;
const file=document.getElementById("postImg").files[0];

let img="";

if(file){
img=await uploadImage(file,"post"); // 🔥 FIXED
}

await addDoc(collection(db,"posts"),{
title,price,desc,img,
uid:auth.currentUser.uid,
createdAt:Date.now()
});
};

/* ================= LOAD POSTS ================= */
function loadPosts(){

const q=query(collection(db,"posts"),orderBy("createdAt","desc"));

onSnapshot(q,(snap)=>{

let html="";

snap.forEach(d=>{
const p=d.data();

html+=`
<div class="post">
<h3>${p.title}</h3>
<p>₱${p.price}</p>
<p>${p.desc}</p>
${p.img?`<img src="${p.img}">`:""}
<button onclick="openChat('${p.uid}')">Message</button>
</div>`;
});

document.getElementById("posts").innerHTML=html;
});
}

/* ================= CHAT ================= */
window.openChat=function(uid){

const chatId =
auth.currentUser.uid<uid
? auth.currentUser.uid+"_"+uid
: uid+"_"+auth.currentUser.uid;

root.innerHTML=`
<div class="main">

<h3>Chat</h3>

<div id="chatBox" class="chatBox"></div>

<input id="msg">
<input type="file" id="chatImg">

<button onclick="send('${chatId}')">Send</button>
<button onclick="home()">Back</button>

</div>`;

loadChat(chatId);
};

/* ================= SEND MESSAGE FIX ================= */
window.send=async function(chatId){

const msg=document.getElementById("msg").value;
const file=document.getElementById("chatImg").files[0];

let img="";

if(file){
img=await uploadImage(file,"chat"); // 🔥 FIXED SEPARATION
}

await addDoc(collection(db,"chats",chatId,"messages"),{
text:msg,
img,
sender:auth.currentUser.uid,
createdAt:Date.now()
});
};

/* ================= LOAD CHAT ================= */
function loadChat(chatId){

const q=query(collection(db,"chats",chatId,"messages"),orderBy("createdAt"));

onSnapshot(q,(snap)=>{

let html="";

snap.forEach(d=>{
const m=d.data();
const me=m.sender===auth.currentUser.uid;

html+=`
<div class="msgRow ${me?'me':'other'}">
<div class="bubble ${me?'mine':'theirs'}">

${m.text||""}
${m.img?`<img src="${m.img}">`:""}

</div>
</div>`;
});

document.getElementById("chatBox").innerHTML=html;
});
}

/* ================= INBOX (STEP 6 REAL BASE) ================= */
window.openInbox=function(){
alert("STEP 6 next upgrade: REAL inbox + unread system 🔥");
};

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(user) home();
else root.innerHTML=`<div class="main"><button onclick="signInWithPopup(auth,new GoogleAuthProvider())">Login</button></div>`;
});

</script>

</body>
</html>
