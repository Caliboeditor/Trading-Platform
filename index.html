<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trading Hub PRO</title>

<style>

/* ================= BASE ================= */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial;
}

body{
  background:#f4f4f4;
}

/* ================= LAYOUT ================= */
.container{
  display:flex;
  height:100vh;
}

/* LEFT SIDE (desktop chat list style optional) */
.sidebar{
  width:280px;
  background:white;
  border-right:1px solid #ddd;
  padding:10px;
  display:none;
}

/* MAIN */
.main{
  flex:1;
  overflow:auto;
  padding:12px;
}

/* ================= CARDS ================= */
.card{
  background:white;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  margin-bottom:10px;
}

/* ================= INPUT ================= */
input,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
}

/* ================= BUTTON ================= */
button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* ================= POSTS ================= */
.post{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* ================= CHAT ================= */
.chatBox{
  height:60vh;
  overflow:auto;
  background:#fafafa;
  border:1px solid #ddd;
  padding:10px;
  border-radius:10px;
}

/* ================= MESSENGER FLOAT ================= */
.messenger-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#0084ff;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  z-index:9999;
}

.badge{
  position:absolute;
  top:5px;
  right:5px;
  background:red;
  color:white;
  width:20px;
  height:20px;
  border-radius:50%;
  font-size:12px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ================= DESKTOP MODE ================= */
@media (min-width:900px){

  .sidebar{
    display:block;
  }

  .main{
    padding:20px;
  }

  .chatBox{
    height:70vh;
  }
}

/* ================= MOBILE MODE ================= */
@media (max-width:600px){

  .container{
    flex-direction:column;
  }

  .sidebar{
    display:none;
  }

  .chatBox{
    height:65vh;
  }

  button{
    font-size:15px;
  }

  input,textarea{
    font-size:15px;
  }
}

</style>
</head>

<body>

<div id="root"></div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  addDoc,
  deleteDoc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAi6LMeK1MwXBBaI4xSvTAjrYn6P0YSTHM",
  authDomain: "trading-web-6d548.firebaseapp.com",
  projectId: "trading-web-6d548",
  storageBucket: "trading-web-6d548.firebasestorage.app",
  messagingSenderId: "465015762771",
  appId: "1:465015762771:web:394098ccad3f3ef2c53ba6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const root = document.getElementById("root");

/* ================= LOGIN ================= */
function loginPage(){
  root.innerHTML=`
    <div class="main">
      <div class="card">
        <h2>🛒 Trading Hub PRO</h2>
        <button onclick="login()">Login with Google</button>
      </div>
    </div>
  `;
}

window.login=function(){
  signInWithPopup(auth,provider);
};

/* ================= USER ================= */
async function checkUser(user){

  const ref=doc(db,"users",user.uid);
  const snap=await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      username:user.displayName,
      createdAt:Date.now()
    });
  }

  marketplace(user);
}

/* ================= POST ================= */
window.addPost=async function(){

  const title=document.getElementById("title").value;
  const price=document.getElementById("price").value;
  const desc=document.getElementById("desc").value;

  const user=auth.currentUser;
  const userDoc=await getDoc(doc(db,"users",user.uid));

  await addDoc(collection(db,"posts"),{
    title,
    price,
    desc,
    username:userDoc.data().username,
    uid:user.uid,
    createdAt:Date.now()
  });
};

/* ================= DELETE ================= */
window.deletePost=async function(id,uid){

  if(auth.currentUser.uid!==uid){
    alert("Not allowed");
    return;
  }

  await deleteDoc(doc(db,"posts",id));
};

/* ================= POSTS ================= */
function loadPosts(){

  const q=query(collection(db,"posts"),orderBy("createdAt","desc"));

  onSnapshot(q,(snap)=>{

    let html="";

    snap.forEach(d=>{

      const p=d.data();
      const id=d.id;
      const me=auth.currentUser.uid===p.uid;

      html+=`
        <div class="post">
          <h3>${p.title}</h3>
          <p>₱${p.price}</p>
          <p>${p.desc}</p>

          <div style="font-size:12px;color:gray;">Seller: ${p.username}</div>

          <button onclick="openChat('${p.uid}','${p.username}')">Message</button>

          ${me?`<button style="background:red;" onclick="deletePost('${id}','${p.uid}')">Delete</button>`:""}
        </div>
      `;
    });

    document.getElementById("posts").innerHTML=html;
  });
}

/* ================= CHAT ================= */
window.openChat=function(sellerId,sellerName){

  const buyerId=auth.currentUser.uid;

  const chatId =
    buyerId < sellerId
      ? buyerId+"_"+sellerId
      : sellerId+"_"+buyerId;

  root.innerHTML=`
    <div class="main">

      <div class="card">
        <h3>💬 ${sellerName}</h3>
      </div>

      <div id="chatBox" class="chatBox"></div>

      <input id="msg" placeholder="message...">
      <button onclick="sendMsg('${chatId}')">Send</button>

      <button onclick="location.reload()">Back</button>

    </div>
  `;

  loadMessages(chatId);
};

/* SEND */
window.sendMsg=async function(chatId){

  const msg=document.getElementById("msg").value;
  if(!msg)return;

  await addDoc(collection(db,"chats",chatId,"messages"),{
    text:msg,
    senderId:auth.currentUser.uid,
    createdAt:Date.now()
  });

  document.getElementById("msg").value="";
};

/* LOAD CHAT */
function loadMessages(chatId){

  const q=query(collection(db,"chats",chatId,"messages"),orderBy("createdAt"));

  onSnapshot(q,(snap)=>{

    let html="";

    snap.forEach(d=>{

      const m=d.data();
      const me=m.senderId===auth.currentUser.uid;

      html+=`
        <div style="text-align:${me?'right':'left'};margin:5px;">
          <span style="background:${me?'black':'#eee'};color:${me?'white':'black'};padding:8px;border-radius:10px;">
            ${m.text}
          </span>
        </div>
      `;
    });

    document.getElementById("chatBox").innerHTML=html;
  });
}

/* ================= MARKETPLACE ================= */
function marketplace(user){

  root.innerHTML=`
    <div class="main">

      <div class="card">
        <h2>Welcome</h2>

        <input id="title" placeholder="Item">
        <input id="price" placeholder="Price">
        <textarea id="desc" placeholder="Description"></textarea>

        <button onclick="addPost()">Post</button>
      </div>

      <div id="posts"></div>

    </div>

    <!-- MESSENGER FLOAT -->
    <div class="messenger-float" onclick="alert('Inbox next upgrade 🚀')">
      💬
      <div class="badge" style="display:none;">1</div>
    </div>
  `;

  loadPosts();
}

/* ================= AUTH ================= */
onAuthStateChanged(auth,(user)=>{
  if(user)checkUser(user);
  else loginPage();
});

loginPage();

</script>

</body>
</html>
